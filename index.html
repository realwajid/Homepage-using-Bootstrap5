<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Clone|Bootstarp 5</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unicons.iconscout.com/release/v4.0.8/css/line.css">
    
    <style>
       
        :root { --bg-dark: #0f0f0f; --card-hover: #272727; --text-gray: #aaaaaa; }
        body { background-color: var(--bg-dark); color: white; font-family: 'Roboto', sans-serif; margin: 0; overflow-x: hidden; }

       
        .navbar { background-color: var(--bg-dark) !important; padding: 0.5rem 1rem; position: sticky; top: 0; z-index: 1050; }
        .search-group { max-width: 600px; width: 100%; }
        .search-input { background: #121212 !important; border: 1px solid #333 !important; color: white !important; border-radius: 40px 0 0 40px !important; }
        .search-btn { background: #222 !important; border: 1px solid #333 !important; color: white !important; border-radius: 0 40px 40px 0 !important; width: 60px; }

       
        .sidebar { height: calc(100vh - 56px); position: sticky; top: 56px; background: var(--bg-dark); overflow-y: auto; scrollbar-width: none; border-right: 1px solid #222; }
        .sidebar::-webkit-scrollbar { display: none; }
        .nav-link { color: white !important; padding: 12px 20px; border-radius: 10px; font-size: 14px; display: flex; align-items: center; }
        .nav-link:hover { background: var(--card-hover) !important; }
        .nav-link i { font-size: 20px; margin-right: 20px; }
        .sidebar-header { padding: 15px 20px 5px; font-size: 16px; font-weight: 500; }

      
        .category-container { position: sticky; top: 56px; background: var(--bg-dark); z-index: 1000; padding: 10px 0; display: flex; overflow-x: auto; gap: 12px; scrollbar-width: none; }
        .category-container::-webkit-scrollbar { display: none; }
        .cat-btn { background: var(--card-hover); color: white; border: none; padding: 6px 15px; border-radius: 8px; white-space: nowrap; font-size: 14px; font-weight: 500; }
        .cat-btn.active { background: white; color: black; }

      
        .video-card { text-decoration: none; color: white; transition: 0.2s; display: block; }
        .thumb-wrapper { position: relative; border-radius: 12px; overflow: hidden; background: #222; }
        .thumb-wrapper img { width: 100%; aspect-ratio: 16/9; object-fit: cover; }
        .duration { position: absolute; bottom: 8px; right: 8px; background: rgba(0,0,0,0.8); padding: 2px 6px; border-radius: 4px; font-size: 12px; }
        
        .channel-pfp { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; margin-top: 12px; }
        .video-info { margin-top: 12px; }
        .v-title { font-size: 14px; font-weight: 500; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 4px; }
        .v-meta { color: var(--text-gray); font-size: 13px; margin: 0; }

        @media (max-width: 991px) { .sidebar { display: none; } .col-main { width: 100%; } }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark px-3">
        <div class="d-flex align-items-center">
            <button class="btn text-white me-2 fs-4 border-0"><i class="uil uil-bars"></i></button>
            <a class="navbar-brand fw-bold d-flex align-items-center" href="#">
                <i class="uil uil-youtube text-danger fs-2 me-1"></i> YouTube
            </a>
        </div>
        <div class="d-none d-md-flex flex-grow-1 justify-content-center">
            <div class="input-group search-group">
                <input type="text" class="form-control search-input shadow-none" placeholder="Search">
                <button class="btn search-btn"><i class="uil uil-search"></i></button>
            </div>
            <button class="btn btn-dark rounded-circle ms-3 border-0 bg-dark"><i class="uil uil-microphone"></i></button>
        </div>
        <div class="d-flex align-items-center gap-3">
            <i class="uil uil-moon fs-4"></i>
            <img src="babarazam.jfif" class="rounded-circle" width="32" height="32" onerror="this.src='https://via.placeholder.com/32'">
        </div>
    </nav>

    <div class="container-fluid p-0">
        <div class="row g-0">
            <aside class="col-lg-2 sidebar">
                <div class="nav flex-column border-bottom border-secondary pb-2">
                    <a class="nav-link" href="#"><i class="uil uil-estate"></i> Home</a>
                    <a class="nav-link" href="#"><i class="uil uil-video"></i> Shorts</a>
                    <a class="nav-link" href="#"><i class="uil uil-tv-retro"></i> Subscriptions</a>
                </div>
                <div class="sidebar-header">You</div>
                <div class="nav flex-column border-bottom border-secondary pb-2">
                    <a class="nav-link" href="#"><i class="uil uil-user-square"></i> Your channel</a>
                    <a class="nav-link" href="#"><i class="uil uil-history"></i> History</a>
                    <a class="nav-link" href="#"><i class="uil uil-clock"></i> Watch later</a>
                </div>
                <div class="sidebar-header">Explore</div>
                <div class="nav flex-column">
                    <a class="nav-link" href="#"><i class="uil uil-fire"></i> Trending</a>
                    <a class="nav-link" href="#"><i class="uil uil-music"></i> Music</a>
                    <a class="nav-link" href="#"><i class="uil uil-basketball"></i> Gaming</a>
                    <a class="nav-link" href="#"><i class="uil uil-trophy"></i> Sports</a>
                </div>
            </aside>

            <main class="col-lg-10 px-4">
                <div class="category-container">
                    <button class="cat-btn active">All</button>
                    <button class="cat-btn">New to you</button>
                    <button class="cat-btn">News</button>
                    <button class="cat-btn">Music</button>
                    <button class="cat-btn">Twenty20 Cricket</button>
                    <button class="cat-btn">Gaming</button>
                    <button class="cat-btn">Podcasts</button>
                    <button class="cat-btn">Live</button>
                    <button class="cat-btn">Media theories</button>
                    <button class="cat-btn">Computer programming</button>
                    <button class="cat-btn">Data analysis</button>
                    <button class="cat-btn">Web design</button>
                </div>

                <div class="row g-4 mt-1">
                    <script>
                        const videos = [
                            {t: "Top 10 Easy To Create JavaScript Games For Beginners", i: "OORUHkgg4IM", v: "27K", d: "4 months"},
                            {t: "How to make Responsive Card Slider in HTML CSS & JS", i: "qOO6lVMhmGc", v: "42K", d: "1 year"},
                            {t: "Responsive Website with Login & Registration Form", i: "YEloDYy3DTg", v: "68K", d: "9 months"},
                            {t: "Build Hangman Game in HTML CSS and JavaScript", i: "hSSdc8vKP1I", v: "57K", d: "11 months"},
                            {t: "How to Make Chrome Extension in HTML CSS", i: "coj-l7IrwGU", v: "24K", d: "1 year"},
                            {t: "Draggable Card Slider in HTML CSS", i: "6QE8dXq9SOE", v: "14.2K", d: "4 days"},
                            {t: "Responsive Image Slider in HTML CSS", i: "q4RgxiDM6v0", v: "1M", d: "1 year"},
                            {t: "Text Typing Effect in HTML CSS & JS", i: "DLs1X9T1GcY", v: "17K", d: "10 months"},
                            {t: "Responsive Image Slider Pro Version", i: "PsNaoDhzQm0", v: "157K", d: "9 months"},
                            {t: "Flipping Card UI Design HTML CSS", i: "20Qb7pNMv-4", v: "85K", d: "2 months"},
                            {t: "Multiple File Uploading in JS", i: "_RSaI2CxlXU", v: "7.4K", d: "3 weeks"},
                            {t: "Responsive Calculator in HTML CSS", i: "cHkN82X3KNU", v: "30K", d: "2 years"},
                            {t: "Currency Converter using ReactJS", i: "0_Lwi5ucGwM", v: "7.2K", d: "2 weeks"},
                            {t: "Admin Dashboard Panel Design", i: "AyV954yKRSw", v: "161K", d: "1 year"}
                        ];

                        videos.forEach(v => {
                            document.write(`
                                <div class="col-12 col-sm-6 col-md-4 col-xl-3">
                                    <a href="#" class="video-card">
                                        <div class="thumb-wrapper">
                                            <img src="https://i.ytimg.com/vi/${v.i}/maxresdefault.jpg">
                                            <span class="duration">10:00</span>
                                        </div>
                                        <div class="d-flex">
                                            <img src="pic1.jfif" class="channel-pfp me-3" onerror="this.src='https://via.placeholder.com/36'">
                                            <div class="video-info">
                                                <h6 class="v-title">${v.t}</h6>
                                                <p class="v-meta">Wajid Ali</p>
                                                <p class="v-meta">${v.v} Views • ${v.d} ago</p>
                                            </div>
                                        </div>
                                    </a>
                                </div>
                            `);
                        });
                    </script>
                </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
